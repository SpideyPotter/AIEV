# NodePort Service for panoptic inference API (stable external access).
# Apply with:     kubectl apply -f k8s/service_inference_nodeport.yaml
# Check with:     kubectl get svc idd-panoptic-inference-nodeport
# Remove with:    kubectl delete -f k8s/service_inference_nodeport.yaml
#
# Access from LAN:
#   http://<node-ip>:30081/health
#   http://<node-ip>:30081/segment
#
# Note: node firewall/security rules must allow inbound TCP 30080.

apiVersion: v1
kind: Service
metadata:
  name: idd-panoptic-inference-nodeport
  labels:
    app: idd-panoptic-inference
spec:
  type: NodePort
  selector:
    app: idd-panoptic-inference
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30081
